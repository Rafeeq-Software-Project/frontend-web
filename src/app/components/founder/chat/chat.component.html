<div class="chat-wrapper" [class.mobile-open]="isMobileChatOpen">
    <!-- Sidebar -->
    <aside class="chat-sidebar">
        <div class="sidebar-search">
            <div class="search-input-wrap">
                <i class="fa-brands fa-sistrix"></i> <input type="text" placeholder="Search chats...">
            </div>
        </div>
        <div class="conversation-list">
            <div class="conversation-item" *ngFor="let conv of conversations"
                [class.active]="conv === selectedConversation" (click)="selectConversation(conv)">
                <div class="avatar-container">
                    <div class="avatar" [ngClass]="conv.user.avatar || 'default-avatar'"></div>
                    <div class="status-dot" [ngClass]="conv.user.status"></div>
                </div>
                <div class="conv-info">
                    <div class="conv-top">
                        <span class="user-name">{{ conv.user.name }}</span>
                        <span class="time">{{ conv.lastMessageTime | date:'shortTime' }}</span>
                    </div>
                    <p class="last-message" [class.unread]="conv.unreadCount > 0">
                        {{ conv.lastMessage }}
                    </p>
                </div>
                <div class="unread-badge" *ngIf="conv.unreadCount > 0">{{ conv.unreadCount }}</div>
            </div>
        </div>
    </aside>

    <!-- Main Chat -->
    <main class="chat-main" *ngIf="selectedConversation; else noSelection">
        <!-- Add a wrapper that triggers animations when the conversation ID changes -->
        <ng-container *ngIf="selectedConversation.id">
            <div class="chat-header">
                <div class="header-user">
                    <button class="back-btn mobile-only-flex" (click)="closeChat()" aria-label="Back">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <div class="avatar header-avatar" [ngClass]="selectedConversation.user.avatar || 'default-avatar'">
                    </div>
                    <div class="user-details">
                        <h4>{{ selectedConversation.user.name }}</h4>
                        <span class="status-text">{{ selectedConversation.user.status }}</span>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" aria-label="Call"><i class="fa-solid fa-phone"></i></button>
                    <button class="icon-btn" aria-label="Video"><i class="fa-solid fa-video"></i></button>
                    <button class="icon-btn" aria-label="Info"><i class="fa-solid fa-circle-info"></i></button>
                </div>
            </div>

            <div class="messages-area">
                <div class="date-divider"><span>Today</span></div>
                <div class="message-bubble" *ngFor="let msg of selectedConversation.messages; let i = index"
                    [class.me]="msg.isMe" [style.animation-delay]="(i * 0.05) + 's'">
                    <div class="message-content">
                        <p>{{ msg.text }}</p>
                        <span class="msg-time">{{ msg.timestamp | date:'shortTime' }}</span>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <button class="attach-btn"><span class="icon-attach"></span></button>
                <div class="input-wrapper">
                    <input type="text" placeholder="Type a message..." [(ngModel)]="newMessageText"
                        (keyup.enter)="sendMessage()">
                </div>
                <button class="send-btn" (click)="sendMessage()" [disabled]="!newMessageText.trim()">
                    <i class="fa-regular fa-paper-plane"></i>
                </button>
            </div>
        </ng-container>
    </main>

    <ng-template #noSelection>
        <div class="no-selection">
            <div class="empty-state-icon"></div>
            <p>Select a conversation to start messaging</p>
        </div>
    </ng-template>
</div>
