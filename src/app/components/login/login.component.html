<div class="login-page">
  <!-- Animated Background Blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <div class="login-card">
    <div class="login-header">
      <div class="logo-container" routerLink="/">
        <img src="assets/Icon_1_0.svg" alt="Rafeeq Logo" class="logo" />
        <span class="brand-name">Rafeeq</span>
      </div>
      <h1 class="welcome-title">Welcome back</h1>
      <p class="welcome-subtitle">Enter your credentials to access your account</p>
    </div>

    <!-- Error Message Alert -->
    <div *ngIf="errorMessage" class="alert alert-danger animate-fade-in">
      <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
    </div>


    <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <!-- Email Field -->
      <div class="field">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope input-icon"></i>
          <input id="email" type="email" formControlName="email" placeholder="Enter your email" autocomplete="email" />
        </div>
        <div class="error-msg" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          <span *ngIf="loginForm.get('email')?.errors?.['required']">Email is required.</span>
          <span *ngIf="loginForm.get('email')?.errors?.['email']">Please enter a valid email address.</span>
        </div>
      </div>

      <!-- Password Field -->
      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password"
            placeholder="Enter your password" autocomplete="current-password" />
          <button type="button" class="password-toggle" (click)="togglePasswordVisibility()"
            aria-label="Toggle password visibility">
            <i class="fas" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
          </button>
        </div>
        <div class="error-msg" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          <span *ngIf="loginForm.get('password')?.errors?.['required']">Password is required.</span>
        </div>
      </div>


      <!-- Form Footer (Remember & Forgot) -->
      <div class="form-footer">
        <label class="remember-me">
          <input type="checkbox">
          <span>Remember me</span>
        </label>
        <a routerLink="/verify-email" class="forgot-link">Forgot password?</a>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn-login" [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading"><i class="fas fa-circle-notch fa-spin"></i> Signing In...</span>
        <i *ngIf="!isLoading" class="fas fa-arrow-right-to-bracket"></i>
      </button>

    </form>

    <div class="divider">
      <span class="divider-text">OR CONTINUE WITH</span>
    </div>

    <div class="social-buttons">
      <button type="button" class="btn-social" (click)="onGoogleLogin()">
        <img src="assets/google.svg" alt="Google">
        <span>Google</span>
      </button>
      <button type="button" class="btn-social" (click)="onFacebookLogin()">
        <img src="assets/facebook.svg" alt="Facebook">
        <span>Facebook</span>
      </button>
    </div>

    <p class="signup-prompt">
      Don't have an account?
      <a routerLink="/signin" class="signup-link">Create Account</a>
    </p>
  </div>
</div>
